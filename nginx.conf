server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' https: blob:; connect-src 'self' https: wss: https://cloudflareinsights.com; frame-src https://www.youtube.com https://player.vimeo.com; frame-ancestors 'self';" always;
    # Stricter CSP in report-only mode — monitor browser console for violations before enforcing.
    # sha256 hashes cover the inline theme-flash-prevention script in index.html (LF and CRLF variants).
    # Once no violations are observed for 1-2 weeks, replace the enforced CSP above with this policy.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'sha256-zw2hSUJHqHcJbpIdroGIRo8j7If7nEHJFyucXSMh6PQ=' 'sha256-X3PXJSwJv5EPNn2YxB3YijiopEQ7Uf2cNbSUIeLLPlM=' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' https: blob:; connect-src 'self' https: wss: https://cloudflareinsights.com; frame-src https://www.youtube.com https://player.vimeo.com; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
